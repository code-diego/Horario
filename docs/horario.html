<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario FC-UNI · Tu horario</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-horario.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <div class="brand-mark">H</div>
                <div class="brand-text">
                    <span class="brand-title">Horario <b>FC·UNI</b></span>
                    <span class="brand-sub">Facultad de Ciencias</span>
                </div>
            </div>
            <div class="topbar-spacer"></div>
            <span class="term-badge">Ciclo 2026-1</span>
            <a class="ig-link" href="https://www.instagram.com/dtp.wolf/" target="_blank" aria-label="Instagram">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="2" width="20" height="20" rx="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
                </svg>
            </a>
        </div>
    </header>

    <main class="wrap">
        <div class="page-head">
            <span class="step-tag"><span class="dot"></span>Paso 2 de 2</span>
            <h1>Tu horario</h1>
            <p>Una combinación sin cruces para tus cursos.</p>
        </div>

        <div class="layout">
            <section>
                <div class="toolbar">
                    <a href="index.html" class="btn btn-ghost btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
                            <path d="M19 12H5M11 18l-6-6 6-6"/>
                        </svg>
                        Editar cursos
                    </a>
                    <span class="conflict-chip" id="conflictChip" hidden>0 cruces</span>
                    <div class="grow"></div>
                </div>
                <div class="card grid-wrap">
                    <div class="grid-scroll scroll">
                        <div class="timetable" id="timetable"></div>
                    </div>
                </div>
            </section>

            <aside class="rail">
                <div class="card rail-intro">
                    <div>
                        <h2>Elige tus secciones</h2>
                        <p>Cada curso puede tener varias secciones. Selecciona la que prefieras.</p>
                    </div>
                </div>
                <div id="secList" style="display:flex;flex-direction:column;gap:14px"></div>
            </aside>
        </div>
    </main>

    <script src="script-fetch.js"></script>

</body>
</html>
